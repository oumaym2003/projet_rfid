<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plan Atelier RFID</title>
  <style>
    :root {
      --bg: #f3f6fa;
      --ink: #1d2a3a;
      --muted: #5f7188;
      --line: #cad5e2;
      --accent: #0a7f5a;
      --accent-soft: #d9f3ea;
      --warn: #d97706;
      --shelf: #0f4c81;
      --workshop: #6b3fa0;
      --rfid: #1f2937;
      --route: #ef4444;
      --route-soft: #fee2e2;
      --current: #0ea5e9;
      --obstacle: #334155;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 12px;
    }

    .map-shell {
      width: min(920px, 98vw);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(15, 35, 62, 0.1);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: #f9fcff;
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, 0.15);
    }

    .viewport {
      overflow: auto;
      padding: 12px;
      background: #fff;
    }

    .scene {
      width: 700px;
      min-width: 700px;
      margin: 0 auto;
      transform-origin: center center;
      transition: transform 220ms ease;
    }

    .grid-wrap {
      position: relative;
      border: 2px solid #9fb1c7;
      border-radius: 10px;
      padding: 26px 10px 10px 26px;
      background:
        linear-gradient(#fff, #fff) padding-box,
        linear-gradient(180deg, #e5edf7, #cfdceb) border-box;
    }

    .coord-row,
    .coord-col {
      position: absolute;
      display: grid;
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
    }

    .coord-row {
      top: 6px;
      left: 26px;
      right: 10px;
      grid-template-columns: repeat(5, 1fr);
      text-align: center;
    }

    .coord-col {
      top: 26px;
      left: 6px;
      bottom: 10px;
      grid-template-rows: repeat(5, 1fr);
      align-items: center;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 8px;
      background: #d7e3f0;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #bccddd;
    }

    .cell {
      min-height: 100px;
      border-radius: 8px;
      border: 1px solid #c8d5e3;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;
      position: relative;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
      transition: box-shadow 180ms ease, transform 180ms ease, border-color 180ms ease;
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
    }

    .dot-rfid { background: #1f2937; }
    .dot-shelf { background: #0f4c81; }
    .dot-workshop { background: #6b3fa0; }
    .dot-entry { background: #d9f3ea; }
    .dot-route { background: #ef4444; }
    .dot-obstacle { background: #334155; }

    .cell small {
      display: block;
      font-weight: 500;
      font-size: 11px;
      color: #e6eef8;
      margin-top: 3px;
      letter-spacing: 0.1px;
    }

    .cell.rfid {
      background: linear-gradient(180deg, #2d3748, var(--rfid));
      color: #f8fbff;
      border-color: #1f2937;
    }

    .cell.shelf {
      background: linear-gradient(180deg, #1f6aa8, var(--shelf));
      color: #f5fbff;
      border-color: #184a72;
    }

    .cell.workshop {
      background: linear-gradient(180deg, #7d4fc0, var(--workshop));
      color: #f6f0ff;
      border-color: #553081;
    }

    .cell.entry {
      border: 2px dashed var(--accent);
      background: linear-gradient(180deg, #f4fffb, var(--accent-soft));
      color: #0b5f44;
    }

    .cell:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(15, 35, 62, 0.12);
    }

    .cell.highlight {
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.2);
    }

    .cell.route {
      border-color: var(--route);
      box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.22);
      background-image: linear-gradient(180deg, rgba(254, 226, 226, 0.45), rgba(254, 226, 226, 0.18));
    }

    .cell.route.current {
      border-color: var(--current);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.28);
    }

    .cell.obstacle {
      border: 2px dashed #475569;
      background: repeating-linear-gradient(
        -45deg,
        #f1f5f9,
        #f1f5f9 8px,
        #e2e8f0 8px,
        #e2e8f0 16px
      );
      color: #334155;
    }

    .route-badge {
      position: absolute;
      right: 6px;
      bottom: 6px;
      min-width: 20px;
      padding: 2px 5px;
      border-radius: 999px;
      background: var(--route);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="map-shell">
    <div class="topbar">
      <div class="title">Plan atelier RFID (grille 5x5)</div>
      <div class="legend">
        <span class="legend-item"><span class="dot dot-rfid"></span> Zone RFID</span>
        <span class="legend-item"><span class="dot dot-shelf"></span> Armoire</span>
        <span class="legend-item"><span class="dot dot-workshop"></span> Atelier</span>
        <span class="legend-item"><span class="dot dot-entry"></span> Entrée</span>
        <span class="legend-item"><span class="dot dot-route"></span> Itinéraire</span>
        <span class="legend-item"><span class="dot dot-obstacle"></span> Zone à éviter</span>
      </div>
    </div>

    <div class="viewport">
      <div class="scene" id="scene">
        <div class="grid-wrap">
          <div class="coord-row">
            <span>(0,0)</span><span>(0,1)</span><span>(0,2)</span><span>(0,3)</span><span>(0,4)</span>
          </div>
          <div class="coord-col">
            <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span>
          </div>

          <div class="grid" id="grid"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const gridEl = document.getElementById('grid');
      const sceneEl = document.getElementById('scene');

      let scale = 1;
      let routeTimer = null;
      let safetyEnabled = false;
      let blockedCells = [];

      const targets = {
        'pos-4-0': { kind: 'shelf', label: 'ARMOIRE A' },
        'pos-2-4': { kind: 'shelf', label: 'ARMOIRE B' },
        'pos-4-1': { kind: 'workshop', label: 'ATELIER 1' },
        'pos-4-2': { kind: 'workshop', label: 'ATELIER 2' },
        'pos-4-4': { kind: 'workshop', label: 'ATELIER 3' },
      };

      const startPoints = {
        'pos-0-2': { kind: 'entry', label: 'ENTREE C' },
      };

      function cellClass(pos) {
        if (targets[pos]) return targets[pos].kind;
        if (startPoints[pos]) return startPoints[pos].kind;
        return 'rfid';
      }

      function cellLabel(pos) {
        if (targets[pos]) return targets[pos].label;
        if (startPoints[pos]) return startPoints[pos].label;
        return 'RFID';
      }

      function renderGrid() {
        const frag = document.createDocumentFragment();
        for (let r = 0; r < 5; r++) {
          for (let c = 0; c < 5; c++) {
            const pos = `pos-${r}-${c}`;
            const cell = document.createElement('button');
            cell.type = 'button';
            cell.className = `cell ${cellClass(pos)} ${pos}`;
            cell.dataset.pos = pos;
            cell.innerHTML = `<div>${cellLabel(pos)}<small>(${r},${c})</small></div>`;
            frag.appendChild(cell);
          }
        }
        gridEl.appendChild(frag);
      }

      function clearHighlights() {
        document.querySelectorAll('.cell.highlight').forEach((el) => el.classList.remove('highlight'));
      }

      function clearRoute() {
        if (routeTimer) {
          clearInterval(routeTimer);
          routeTimer = null;
        }
        document.querySelectorAll('.cell.route, .cell.current').forEach((el) => {
          el.classList.remove('route', 'current');
        });
        document.querySelectorAll('.route-badge').forEach((el) => el.remove());
      }

      function clearObstacles() {
        document.querySelectorAll('.cell.obstacle').forEach((el) => el.classList.remove('obstacle'));
      }

      function renderObstacles() {
        clearObstacles();
        if (!safetyEnabled) return;
        blockedCells.forEach((pos) => {
          const cell = document.querySelector(`.cell.${pos}`);
          if (cell) cell.classList.add('obstacle');
        });
      }

      function setScale(next) {
        scale = Math.max(0.7, Math.min(1.8, next));
        sceneEl.style.transform = `scale(${scale})`;
      }

      function animateRoute(path) {
        clearRoute();
        if (!Array.isArray(path) || path.length === 0) return;

        let index = 0;

        const directionSymbol = (a, b) => {
          if (!a || !b) return '✓';
          const pa = /^pos-(\d+)-(\d+)$/.exec(a);
          const pb = /^pos-(\d+)-(\d+)$/.exec(b);
          if (!pa || !pb) return '•';
          const ar = Number(pa[1]), ac = Number(pa[2]);
          const br = Number(pb[1]), bc = Number(pb[2]);
          if (br > ar) return '↓';
          if (br < ar) return '↑';
          if (bc > ac) return '→';
          if (bc < ac) return '←';
          return '•';
        };

        routeTimer = setInterval(() => {
          document.querySelectorAll('.cell.current').forEach((el) => el.classList.remove('current'));
          const pos = path[index];
          const cell = document.querySelector(`.cell.${pos}`);
          if (cell) {
            cell.classList.add('route', 'current');
            if (!cell.querySelector('.route-badge')) {
              const badge = document.createElement('span');
              badge.className = 'route-badge';
              const arrow = directionSymbol(path[index], path[index + 1]);
              badge.textContent = `${index + 1}${arrow}`;
              cell.appendChild(badge);
            }
            cell.scrollIntoView({ block: 'nearest', inline: 'nearest', behavior: 'smooth' });
          }

          index += 1;
          if (index >= path.length) {
            clearInterval(routeTimer);
            routeTimer = null;
          }
        }, 420);
      }

      document.addEventListener('click', (ev) => {
        const cell = ev.target.closest('.cell');
        if (!cell) return;
        const pos = cell.dataset.pos;
        window.parent.postMessage(JSON.stringify({ type: 'mapClick', pos }), '*');
      });

      window.addEventListener('message', (ev) => {
        try {
          const data = typeof ev.data === 'string' ? JSON.parse(ev.data) : ev.data;
          if (!data || !data.type) return;

          if (data.type === 'highlight') {
            clearHighlights();
            const el = document.querySelector(`.cell.${data.pos}`);
            if (el) {
              el.classList.add('highlight');
              el.scrollIntoView({ block: 'nearest', inline: 'nearest', behavior: 'smooth' });
            }
          } else if (data.type === 'route') {
            animateRoute(data.path);
          } else if (data.type === 'safety') {
            safetyEnabled = !!data.enabled;
            blockedCells = Array.isArray(data.blocked) ? data.blocked : [];
            renderObstacles();
          } else if (data.type === 'clear') {
            clearHighlights();
            clearRoute();
          } else if (data.type === 'zoomIn') {
            setScale(scale + 0.1);
          } else if (data.type === 'zoomOut') {
            setScale(scale - 0.1);
          } else if (data.type === 'setScale' && typeof data.scale === 'number') {
            setScale(data.scale);
          } else if (data.type === 'fit') {
            setScale(1);
          }
        } catch (e) {
          console.warn('map postMessage error', e);
        }
      });

      renderGrid();
      setScale(1);
    })();
  </script>
</body>
</html>
